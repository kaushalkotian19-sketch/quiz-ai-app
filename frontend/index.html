<!DOCTYPE html>
<html>
<head>
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app">
    <h1>AI Quiz Game</h1>

    <button id="startBtn">Start Quiz</button>

    <div id="quiz" style="display:none;">
      <h2 id="question"></h2>
      <div id="options"></div>
      <p id="timer">Time: 10</p>
    </div>

    <h2 id="result"></h2>
  </div>

  <script src="app.js"></script>
</body>
</html>
